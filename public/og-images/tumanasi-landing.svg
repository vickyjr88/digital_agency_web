<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0f62a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>

    <!-- Decorative circles -->
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="120" fill="rgba(255,255,255,0.05)" filter="url(#blur)"/>
  <circle cx="1100" cy="530" r="150" fill="rgba(249,115,22,0.15)" filter="url(#blur)"/>

  <!-- Package Icon (simple box) -->
  <g transform="translate(150, 120)">
    <!-- Box -->
    <rect x="0" y="30" width="80" height="80" fill="none" stroke="white" stroke-width="4" rx="4"/>
    <line x1="40" y1="30" x2="40" y2="110" stroke="white" stroke-width="4"/>
    <line x1="0" y1="70" x2="80" y2="70" stroke="white" stroke-width="4"/>
    <!-- Delivery icon -->
    <path d="M 20,45 L 60,45 L 60,95" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Main Text -->
  <text x="300" y="190" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="8">
    TUMANASI
  </text>

  <!-- Tagline -->
  <text x="300" y="250" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.9)">
    Your Partner in Sending Easy
  </text>

  <!-- Description -->
  <text x="300" y="320" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="rgba(255,255,255,0.8)">
    Fast, safe, photo-verified delivery across Nairobi
  </text>

  <!-- Features -->
  <g transform="translate(300, 370)">
    <!-- Feature 1 -->
    <g>
      <circle cx="10" cy="10" r="8" fill="#f97316"/>
      <text x="35" y="18" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" font-weight="600">
        Same-day delivery · 200+ areas
      </text>
    </g>

    <!-- Feature 2 -->
    <g transform="translate(0, 40)">
      <circle cx="10" cy="10" r="8" fill="#f97316"/>
      <text x="35" y="18" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" font-weight="600">
        Verified riders · Photo proof
      </text>
    </g>

    <!-- Feature 3 -->
    <g transform="translate(0, 80)">
      <circle cx="10" cy="10" r="8" fill="#f97316"/>
      <text x="35" y="18" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" font-weight="600">
        Pay on delivery · From KES 100
      </text>
    </g>
  </g>

  <!-- Bottom branding -->
  <text x="300" y="590" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">
    tumanasi.dexter.vitaldigitalmedia.net
  </text>
</svg>
