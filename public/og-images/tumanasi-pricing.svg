<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="pricingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0f62a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>

    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#pricingGradient)"/>

  <!-- Decorative Elements -->
  <circle cx="150" cy="100" r="100" fill="rgba(255,255,255,0.05)" filter="url(#blur)"/>
  <circle cx="1050" cy="500" r="120" fill="rgba(249,115,22,0.15)" filter="url(#blur)"/>

  <!-- Truck Icon -->
  <g transform="translate(120, 100)">
    <!-- Truck body -->
    <rect x="30" y="40" width="70" height="50" fill="white" rx="4"/>
    <!-- Truck cabin -->
    <rect x="0" y="50" width="40" height="40" fill="white" rx="4"/>
    <!-- Wheels -->
    <circle cx="35" cy="100" r="12" fill="#f97316"/>
    <circle cx="80" cy="100" r="12" fill="#f97316"/>
  </g>

  <!-- Main Title -->
  <text x="280" y="140" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="900" fill="white" letter-spacing="4">
    TUMANASI PRICING
  </text>

  <!-- Subtitle -->
  <text x="280" y="200" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.9)">
    Transparent, Flat-Rate Delivery Across Nairobi
  </text>

  <!-- Price Cards -->
  <g transform="translate(280, 260)">
    <!-- Card 1: CBD -->
    <g>
      <rect x="0" y="0" width="220" height="120" fill="rgba(255,255,255,0.15)" rx="12"/>
      <text x="15" y="35" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" font-weight="600">
        CBD / City Centre
      </text>
      <text x="15" y="80" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="#f97316" font-weight="900">
        KES 150
      </text>
    </g>

    <!-- Card 2: Ngong Road -->
    <g transform="translate(250, 0)">
      <rect x="0" y="0" width="220" height="120" fill="rgba(255,255,255,0.15)" rx="12"/>
      <text x="15" y="35" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" font-weight="600">
        Ngong Road Area
      </text>
      <text x="15" y="80" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="#f97316" font-weight="900">
        KES 300
      </text>
    </g>

    <!-- Card 3: Thika Road -->
    <g transform="translate(500, 0)">
      <rect x="0" y="0" width="220" height="120" fill="rgba(255,255,255,0.15)" rx="12"/>
      <text x="15" y="35" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" font-weight="600">
        Thika Road Area
      </text>
      <text x="15" y="80" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="#f97316" font-weight="900">
        KES 350
      </text>
    </g>
  </g>

  <!-- Bottom text -->
  <g transform="translate(280, 450)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="white" font-weight="700">
      📍 200+ Areas Covered
    </text>
    <text x="0" y="45" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.8)">
      No hidden fees • Pay on delivery • Live tracking
    </text>
  </g>

  <!-- Footer -->
  <text x="280" y="590" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">
    tumanasi.dexter.vitaldigitalmedia.net/pricing
  </text>
</svg>
